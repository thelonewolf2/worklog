// ═══════════════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════════════
const pad    = n => String(n).padStart(2,"0");
const fmtDur = ms => { if(!ms||ms<0)return"0h 0m"; const m=Math.floor(ms/60000); return`${Math.floor(m/60)}h ${m%60}m`; };
const msToH  = ms => ms>0 ? ms/3600000 : 0;
const toISO  = (d,t) => new Date(`${d}T${t}:00`).toISOString();
const dateVal= iso => { const d=new Date(iso); return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const fmtD   = iso => new Date(iso).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
const fmtT   = iso => iso ? new Date(iso).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) : "--:--";
const fmtTF  = iso => iso ? new Date(iso).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"}) : "--:--:--";
const today  = () => new Date().toLocaleDateString();
const hashPw = s => { let h=0x12345678; for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=(h<<5)|(h>>>27);h^=s.charCodeAt(i)*0x9e3779b9;} return(h>>>0).toString(16).padStart(8,"0"); };

const getPP  = (d=new Date()) => { const x=new Date(d); let y=x.getFullYear(),m=x.getMonth(); if(x.getDate()<23){m--;if(m<0){m=11;y--;}} return{s:new Date(y,m,23,0,0,0,0),e:new Date(y,m+1,22,23,59,59,999)}; };
const ppLabel= s => { const a=new Date(s),b=new Date(new Date(s).getFullYear(),new Date(s).getMonth()+1,22); return`${a.toLocaleDateString("en-GB",{day:"numeric",month:"short"})} – ${b.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}`; };
const ppKey  = s => { const a=new Date(s); return`${a.getFullYear()}-${pad(a.getMonth()+1)}`; };
const inPP   = (ents,s,e) => ents.filter(x=>{const d=new Date(x.clockIn);return d>=s&&d<=e;});

function renderSbar(el){

}

// Search Drive (root, not appDataFolder) for worklog-data.json
async function driveFindJson(){
  try{
    const r=await fetch(
      "https://www.googleapis.com/drive/v3/files?q=name%3D'worklog-data.json'+and+trashed%3Dfalse&fields=files(id,name)&spaces=drive",
      {headers:{Authorization:"Bearer "+gToken}}
    );
    if(!r.ok)return null;
    const d=await r.json();
    return d.files?.[0]?.id||null;
  }catch{return null;}
}

async function driveRead(){
  if(!gToken){loadCache();setSt("idle");render();return;}
  setSt("syncing");
  try{
    // Find the JSON file in Drive (create later if missing)
    let fid=gFileId||(await driveFindJson());
    if(!fid){
      // No JSON file yet — start fresh, will be created on first write
      setSt("idle"); saveCache(); render(); return;
    }
    gFileId=fid; LC.set("wl_jsonFileId",fid);
    const r=await fetch(
      `https://www.googleapis.com/drive/v3/files/${fid}?alt=media`,
      {headers:{Authorization:"Bearer "+gToken}}
    );
    if(!r.ok){
      if(r.status===404){
        // File deleted from Drive — reset and start fresh
        gFileId=""; LC.set("wl_jsonFileId","");
        setSt("idle"); render(); return;
      }
      setSt("error"); render(); return;
    }
    const text=await r.text();
    try{
      const data=JSON.parse(text);
      DB={...DB,...data}; saveCache(); setSt("saved"); render();
    }catch{
      setSt("error"); render();
    }
  }catch(e){
    console.error("driveRead error:",e);
    setSt("offline"); render();
  }
}

async function driveWrite(){
  DB.meta={...DB.meta,lastModified:new Date().toISOString()};
  saveCache();
  if(!gToken){setSt("idle");return;}
  const body=JSON.stringify(DB);
  try{
    let fid=gFileId||(await driveFindJson());
    if(fid){
      // Update existing file
      gFileId=fid; LC.set("wl_jsonFileId",fid);
      const r=await fetch(
        `https://www.googleapis.com/upload/drive/v3/files/${fid}?uploadType=media`,
        {method:"PATCH",headers:{Authorization:"Bearer "+gToken,"Content-Type":"application/json"},body}
      );
      setSt(r.ok?"saved":"error");
    }else{
      // Create new worklog-data.json in Drive root
      const meta=JSON.stringify({name:"worklog-data.json"});
      const fd=new FormData();
      fd.append("metadata",new Blob([meta],{type:"application/json"}));
      fd.append("file",new Blob([body],{type:"application/json"}));
      const r=await fetch(
        "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",
        {method:"POST",headers:{Authorization:"Bearer "+gToken},body:fd}
      );
      if(r.ok){const d=await r.json();gFileId=d.id;LC.set("wl_jsonFileId",d.id);setSt("saved");}
      else setSt("error");
    }
  }catch(e){
    console.error("driveWrite error:",e);
    setSt("offline");
  }
}

const scheduleWrite = () => { clearTimeout(syncTmr); setSt("syncing"); syncTmr=setTimeout(driveWrite,1100); };
const mutate = fn => { fn(DB); scheduleWrite(); render(); };

function initGoogle(){
  if(!window.google)return;
  gTokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID, scope:SCOPES,
    callback:async resp=>{
      if(resp.error)return;
      gToken=resp.access_token;
      try{const r=await fetch("https://www.googleapis.com/oauth2/v3/userinfo",{headers:{Authorization:"Bearer "+gToken}});if(r.ok)gUser=await r.json();}catch{}
      await driveRead();
    }
  });
}

const mst = (l,v,c) => `<div style="flex:1;background:rgba(0,0,0,.25);border-radius:8px;padding:8px 5px;border:1px solid ${c}18;text-align:center;"><div style="font-size:7px;letter-spacing:2px;color:#181828;margin-bottom:2px;">${l}</div><div style="font-size:12px;font-weight:700;color:${c};">${v}</div></div>`;
const ms2  = (l,v,c) => `<div><div style="font-size:7px;color:#0a1a0a;letter-spacing:2px;">${l}</div><div style="font-size:13px;font-weight:700;color:${c};">${v}</div></div>`;
const kv   = (k,v,vc="#555") => `<div class="row"><span style="color:#2a2a44;">${k}</span><span style="color:${vc};">${v}</span></div>`;

function rBal(bal,exp,rcvd,curr){
  const bg=bal>0?"rgba(255,107,107,.07)":bal<0?"rgba(153,136,255,.07)":"rgba(107,255,184,.07)";
  const bd=bal>0?"rgba(255,107,107,.18)":bal<0?"rgba(153,136,255,.18)":"rgba(107,255,184,.18)";
  const cl=bal>0?"#ff6b6b":bal<0?"#9988ff":"#6bffb8";
  const lb=bal>0?"OWED TO YOU":bal<0?"OVERPAID BY":"ALL PAID ✓";
  return`<div style="background:${bg};border:1px solid ${bd};border-radius:10px;padding:13px;margin-bottom:11px;">
    <div style="font-size:7px;letter-spacing:3px;color:#3a3a3a;margin-bottom:4px;">${lb}</div>
    <div style="font-size:32px;font-weight:700;color:${cl};">${curr}${Math.abs(bal).toFixed(2)}</div>
    <div style="display:flex;justify-content:space-between;margin-top:7px;font-size:9px;color:#2a2a2a;">
      <span>Expected: ${curr}${(exp||0).toFixed(2)}</span><span>Received: ${curr}${(rcvd||0).toFixed(2)}</span>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════════
// BIND
// ═══════════════════════════════════════════════════════════════════════
function bind(){
  // Break inputs
  document.querySelectorAll("[data-bs]").forEach(el=>{
    el.oninput=ev=>{const i=+el.dataset.bs;if(!A.form.mBrks)A.form.mBrks=[];while(A.form.mBrks.length<=i)A.form.mBrks.push({s:"",e:""});A.form.mBrks[i]={...A.form.mBrks[i],s:ev.target.value};};
  });
  document.querySelectorAll("[data-be]").forEach(el=>{
    el.oninput=ev=>{const i=+el.dataset.be;if(!A.form.mBrks)A.form.mBrks=[];while(A.form.mBrks.length<=i)A.form.mBrks.push({s:"",e:""});A.form.mBrks[i]={...A.form.mBrks[i],e:ev.target.value};};
  });
  // Enter keys
  [["inp-un","ulogin"],["inp-pw","ulogin"],["inp-apw","alogin"],["mod-pw","confirm-uapw"]].forEach(([id,act])=>{
    const el=document.getElementById(id); if(el) el.onkeydown=ev=>{if(ev.key==="Enter")do_act(act);};
  });
  // Clicks
  document.addEventListener("click",clickH,{once:true});
  // Sync bar init
  document.querySelectorAll(".sbar").forEach(el=>renderSbar(el));
  // Live clock
  if(A.mode==="uapp"){
    clearInterval(clkIval);
    clkIval=setInterval(()=>{
      const el=document.getElementById("lclk");
      if(el)el.textContent=new Date().toLocaleTimeString();
      if(A.cs.working)render();
    },1000);
  }
}
function clickH(ev){
  const btn=ev.target.closest("[data-action]");
  if(btn){ev.stopPropagation();do_act(btn.dataset.action,ev);}
  else document.addEventListener("click",clickH,{once:true});
}

// ═══════════════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════════════
function do_act(action,ev){
  const gv=id=>{const el=document.getElementById(id);return el?el.value:"";};
  const f=A.form;
  const re=()=>document.addEventListener("click",clickH,{once:true});

  // ── Chooser ──────────────────────────────────────────────────────────
  if(action==="go-ulogin"){A.mode="ulogin";A.form={};render();return;}
  if(action==="go-alogin"){A.mode="alogin";A.form={};render();return;}
  if(action==="back"){A.mode="chooser";render();return;}
  if(action==="gsignin"){if(gTokenClient)gTokenClient.requestAccessToken({prompt:"consent"});else alert("Set up Google OAuth Client ID first.");return;}
  if(action==="gsignout"){if(gToken&&window.google)google.accounts.oauth2.revoke(gToken,()=>{});gToken=null;gUser=null;render();return;}
  if(action==="save-fid"){
    const id=(gv("inp-fid")||"").trim();
    LC.set("wl_jsonFileId",id); gFileId=id;
    if(gToken&&id){driveRead();}else{alert("File ID saved. Sign in with Google to enable sync.");}
    return;
  }
  if(action==="do-sync"){driveRead();return;}

  // ── User login ────────────────────────────────────────────────────────
  if(action==="spw"){f.spw=!f.spw;f.un=gv("inp-un")||f.un||"";f.pw=gv("inp-pw")||f.pw||"";render();return;}
  if(action==="ulogin"){
    const un=(gv("inp-un")||f.un||"").toLowerCase().trim();
    const pw=gv("inp-pw")||f.pw||"";
    const users=DB.users||[];
    if(!users.length){f.err="No accounts yet. Ask admin to create one.";render();return;}
    const user=users.find(u=>u.username.toLowerCase()===un);
    if(!user){f.err="Username not found.";render();return;}
    if(user.passwordHash!==hashPw(pw)){f.err="Incorrect password.";render();return;}
    A.session={userId:user.id,username:user.username,name:user.name};
    A.mode="uapp";A.form={};A.utab="clock";
    A.cs={ci:null,bi:null,brks:[],working:false,onBreak:false};
    render();return;
  }
  if(action==="ulogout"){A.session=null;A.mode="ulogin";A.form={};A.aOpen=false;clearInterval(clkIval);render();return;}

  // ── User tabs ─────────────────────────────────────────────────────────
  if(action.startsWith("ut-")){A.utab=action.slice(3);render();return;}

  // ── User admin panel ──────────────────────────────────────────────────
  if(action==="ua-toggle"){
    if(A.aOpen){A.aOpen=false;A.aShowPanel=false;render();return;}
    A.modal={type:"user-apw",label:"⚙ Open admin settings",onOk:()=>{A.aOpen=true;A.aShowPanel=true;A.modal=null;A.utab="pay";render();}};
    render();return;
  }
  if(action==="close-ap"){A.aShowPanel=false;A.aOpen=false;render();return;}
  if(action==="open-chg-apw"){A.modal={type:"chg-apw"};render();return;}

  // ── Clock ─────────────────────────────────────────────────────────────
  if(action==="clkin"){A.cs={ci:new Date().toISOString(),working:true,brks:[],bi:null,onBreak:false};render();return;}
  if(action==="clkout"){
    const cs=A.cs; if(!cs.working)return;
    const co=new Date().toISOString();
    let brks=[...(cs.brks||[])];
    if(cs.onBreak&&cs.bi)brks.push({s:cs.bi,e:co});
    const wMs=new Date(co)-new Date(cs.ci);
    const bMs=brks.reduce((a,b)=>a+(new Date(b.e)-new Date(b.s)),0);
    const entry={id:Date.now(),userId:A.session.userId,date:new Date(cs.ci).toLocaleDateString(),clockIn:cs.ci,clockOut:co,breaks:brks.map(b=>({start:b.s,end:b.e})),workMs:wMs,breakMs:bMs,netMs:wMs-bMs,manual:false};
    mutate(db=>{if(!db.entries)db.entries=[];db.entries.push(entry);});
    A.cs={ci:null,working:false,onBreak:false,bi:null,brks:[]};
    A.utab="entries";render();return;
  }
  if(action==="brkin"){if(!A.cs.working||A.cs.onBreak)return;A.cs={...A.cs,bi:new Date().toISOString(),onBreak:true};render();return;}
  if(action==="brkout"){if(!A.cs.onBreak)return;A.cs={...A.cs,brks:[...(A.cs.brks||[]),{s:A.cs.bi,e:new Date().toISOString()}],bi:null,onBreak:false};render();return;}

  // ── Manual entry form ─────────────────────────────────────────────────
  if(action==="open-aform"){A.showAForm=true;f.mBrks=[{s:"",e:""}];f.editEid=null;render();return;}
  if(action==="cancel-mform"){A.showAForm=false;A.aOpen=false;A.modal=null;f.editEid=null;f.mErr="";render();return;}
  if(action==="add-brk"){if(!f.mBrks)f.mBrks=[];f.mBrks.push({s:"",e:""});render();return;}
  if(action.startsWith("rm-brk-")){const i=+action.split("-").pop();f.mBrks=(f.mBrks||[]).filter((_,j)=>j!==i);render();return;}

  // ── Open EDIT for a user entry (user side) ─────────────────────────────
  if(action.startsWith("open-edit-ue-")){
    const eid=+action.replace("open-edit-ue-","");
    const e=(DB.entries||[]).find(x=>x.id===eid); if(!e)return;
    f.editEid=eid; f.forUid=e.userId;
    f.mDate=dateVal(e.clockIn);
    f.mIn=new Date(e.clockIn).toTimeString().slice(0,5);
    f.mOut=new Date(e.clockOut).toTimeString().slice(0,5);
    const rawBrks=(e.breaks||[]).map(b=>({s:new Date(b.start||b.s).toTimeString().slice(0,5),e:new Date(b.end||b.e).toTimeString().slice(0,5)}));
    f.mBrks=rawBrks.length?rawBrks:[{s:"",e:""}];
    A.showAForm=true; render(); return;
  }

  // ── Open EDIT for an entry (admin side) ───────────────────────────────
  if(action.startsWith("open-edit-ae-")){
    const eid=+action.replace("open-edit-ae-","");
    const e=(DB.entries||[]).find(x=>x.id===eid); if(!e)return;
    f.editEid=eid; f.forUid=e.userId;
    f.mDate=dateVal(e.clockIn);
    f.mIn=new Date(e.clockIn).toTimeString().slice(0,5);
    f.mOut=new Date(e.clockOut).toTimeString().slice(0,5);
    const rawBrks=(e.breaks||[]).map(b=>({s:new Date(b.start||b.s).toTimeString().slice(0,5),e:new Date(b.end||b.e).toTimeString().slice(0,5)}));
    f.mBrks=rawBrks.length?rawBrks:[{s:"",e:""}];
    A.modal={type:"add-shift",uid:e.userId}; render(); return;
  }

  if(action==="save-mentry"){
    const uid=f.forUid||A.session?.userId||A.modal?.uid;
    const mDate=gv("m-date")||f.mDate||"";
    const mIn=gv("m-in")||f.mIn||"";
    const mOut=gv("m-out")||f.mOut||"";
    if(!mDate||!mIn||!mOut){f.mErr="Date, clock-in and clock-out required.";render();return;}
    const ci=toISO(mDate,mIn),co=toISO(mDate,mOut);
    if(new Date(co)<=new Date(ci)){f.mErr="Clock-out must be after clock-in.";render();return;}
    const brks=(f.mBrks||[]).filter(b=>b.s&&b.e).map(b=>({start:toISO(mDate,b.s),end:toISO(mDate,b.e)}));
    const wMs=new Date(co)-new Date(ci),bMs=brks.reduce((a,b)=>a+(new Date(b.end)-new Date(b.start)),0);
    if(f.editEid){
      mutate(db=>{db.entries=(db.entries||[]).map(x=>x.id===f.editEid?{...x,date:new Date(ci).toLocaleDateString(),clockIn:ci,clockOut:co,breaks:brks,workMs:wMs,breakMs:bMs,netMs:wMs-bMs,manual:true}:x);});
    }else{
      const entry={id:Date.now(),userId:uid,date:new Date(ci).toLocaleDateString(),clockIn:ci,clockOut:co,breaks:brks,workMs:wMs,breakMs:bMs,netMs:wMs-bMs,manual:true,addedByAdmin:A.mode==="aapp"};
      mutate(db=>{if(!db.entries)db.entries=[];db.entries.push(entry);});
    }
    A.showAForm=false;A.aOpen=false;A.modal=null;
    f.editEid=null;f.forUid=null;f.mDate="";f.mIn="";f.mOut="";f.mBrks=[{s:"",e:""}];f.mErr="";
    render();return;
  }

  // ── Payment form (user side) ──────────────────────────────────────────
  if(action==="open-pform"){A.showPForm=true;f.payAmt="";f.payDate="";f.payNote="";render();return;}
  if(action==="cancel-pform"){A.showPForm=false;A.aOpen=false;A.modal=null;render();return;}
  if(action==="save-pay"){
    const amt=gv("pay-amt"),dt=gv("pay-date"),note=gv("pay-note")||"";
    if(!amt||!dt)return;
    const {s}=getPP();
    const p={id:Date.now(),userId:A.session.userId,amount:parseFloat(amt),date:dt,note,periodKey:ppKey(s),addedByAdmin:false};
    mutate(db=>{if(!db.payments)db.payments=[];db.payments.push(p);});
    A.showPForm=false;A.aOpen=false;f.payAmt="";f.payDate="";f.payNote="";render();return;
  }

  // ── Delete entry/payment (user side) ─────────────────────────────────
  if(action.startsWith("udel-e-")){
    const eid=+action.slice(7);
    if(A.aOpen){mutate(db=>{db.entries=(db.entries||[]).filter(e=>e.id!==eid);});render();return;}
    A.modal={type:"user-apw",label:"🗑 Delete this shift",onOk:()=>{mutate(db=>{db.entries=(db.entries||[]).filter(e=>e.id!==eid);});A.modal=null;render();}};
    render();return;
  }
  if(action.startsWith("udel-pay-")){const id=+action.slice(9);mutate(db=>{db.payments=(db.payments||[]).filter(p=>p.id!==id);});render();return;}

  // ── Toggle entry detail ───────────────────────────────────────────────
  if(action.startsWith("tgl-e-")){
    const id=action.slice(6);
    const el=document.getElementById("ed-"+id);
    const btn=ev?.target.closest("[data-action]");
    if(el){el.style.display=el.style.display==="none"?"block":"none";if(btn)btn.textContent=el.style.display==="none"?"INFO":"HIDE";}
    re();return;
  }

  // ── User generate report (NO admin password needed) ───────────────────
  if(action==="gen-report"){
    const uid=A.session.userId;
    const {s:pS,e:pE}=getPP();const pk=ppKey(pS);
    if((DB.reports||[]).find(r=>r.userId===uid&&r.periodKey===pk))return;
    const me=(DB.users||[]).find(u=>u.id===uid)||{};
    const rate=parseFloat(me.hourlyRate)||0;
    const ents=(DB.entries||[]).filter(e=>e.userId===uid);
    const pMs=inPP(ents,pS,pE).reduce((a,e)=>a+(e.netMs||0),0); const pH=msToH(pMs);
    const pPays=(DB.payments||[]).filter(p=>p.userId===uid&&p.periodKey===pk);
    const pRcvd=pPays.reduce((a,p)=>a+(parseFloat(p.amount)||0),0);
    const r={id:Date.now(),userId:uid,periodKey:pk,label:ppLabel(pS),totalMs:pMs,totalHours:pH,expectedPay:pH*rate,totalReceived:pRcvd,balance:pH*rate-pRcvd,payments:[...pPays],generated:new Date().toISOString()};
    mutate(db=>{if(!db.reports)db.reports=[];db.reports.push(r);});
    A.utab="reports";render();return;
  }

  // ── Admin login ───────────────────────────────────────────────────────
  if(action==="alogin"){
    const pw=gv("inp-apw")||f.apw||"";
    if(pw!==(DB.adminPw||"pluto2024")){f.aerr="Incorrect password.";render();return;}
    A.mode="aapp";A.atab="users";A.form={};render();return;
  }
  if(action==="alogout"){A.mode="chooser";A.selUid=null;render();return;}

  // ── Admin tabs / navigation ───────────────────────────────────────────
  if(action.startsWith("at-")){A.atab=action.slice(3);render();return;}
  if(action.startsWith("vu-")){A.selUid=+action.slice(3);A.udTab="shifts";A.modal=null;render();return;}
  if(action==="back-users"){A.selUid=null;A.modal=null;render();return;}
  if(action.startsWith("udt-")){A.udTab=action.slice(4);render();return;}

  // ── Admin create user ─────────────────────────────────────────────────
  if(action==="open-cu"){A.modal={type:"create-user"};render();return;}
  if(action==="save-cu"){
    const name=gv("nu-name"),un=gv("nu-user"),pw=gv("nu-pw"),apw=gv("nu-apw")||"admin123",rate=gv("nu-rate");
    const el=document.getElementById("cu-err");
    if(!name||!un||!pw){if(el)el.textContent="Name, username and password required.";re();return;}
    if((DB.users||[]).find(u=>u.username.toLowerCase()===un.toLowerCase().trim())){if(el)el.textContent="Username already exists.";re();return;}
    const nu={id:Date.now(),username:un.trim().toLowerCase(),name:name.trim(),passwordHash:hashPw(pw),adminPassword:apw.trim()||"admin123",hourlyRate:parseFloat(rate)||0,createdAt:new Date().toISOString()};
    mutate(db=>{if(!db.users)db.users=[];db.users.push(nu);});
    A.modal=null;render();return;
  }

  // ── Admin edit rate ───────────────────────────────────────────────────
  if(action.startsWith("open-er-")){const uid=+action.slice(8);const u=(DB.users||[]).find(x=>x.id===uid);A.modal={type:"edit-rate",uid,cur:u?.hourlyRate||""};render();return;}
  if(action==="save-er"){const uid=A.modal.uid;mutate(db=>{db.users=(db.users||[]).map(u=>u.id===uid?{...u,hourlyRate:parseFloat(gv("er-val")||"0")||0}:u);});A.modal=null;render();return;}

  // ── Admin reset login password ────────────────────────────────────────
  if(action.startsWith("open-rspw-")){const uid=+action.slice(10);A.modal={type:"reset-pw",uid};render();return;}
  if(action==="save-rp"){
    const uid=A.modal.uid,pw=gv("rp-pw"),cf=gv("rp-cf");
    const msg=document.getElementById("rp-msg");
    if(!pw){if(msg){msg.textContent="Cannot be empty.";msg.style.color="#ff6b6b";}re();return;}
    if(pw!==cf){if(msg){msg.textContent="Passwords don't match.";msg.style.color="#ff6b6b";}re();return;}
    mutate(db=>{db.users=(db.users||[]).map(u=>u.id===uid?{...u,passwordHash:hashPw(pw)}:u);});
    A.modal=null;render();return;
  }

  // ── Admin add/edit shift ──────────────────────────────────────────────
  if(action.startsWith("open-as-")){const uid=+action.slice(8);f.mBrks=[{s:"",e:""}];f.editEid=null;f.forUid=uid;A.modal={type:"add-shift",uid};render();return;}
  if(action.startsWith("adel-e-")){
    const eid=+action.slice(7);
    A.modal={type:"confirm",message:"Delete this shift permanently?",onOk:()=>{mutate(db=>{db.entries=(db.entries||[]).filter(e=>e.id!==eid);});A.modal=null;render();}};
    render();return;
  }
  if(action.startsWith("adel-pay-")){const id=+action.slice(9);mutate(db=>{db.payments=(db.payments||[]).filter(p=>p.id!==id);});render();return;}

  // ── Admin record payment ──────────────────────────────────────────────
  if(action.startsWith("open-rp-")){const uid=+action.slice(8);A.modal={type:"record-pay",uid};f.payAmt="";f.payDate="";f.payNote="";render();return;}
  if(action==="save-pay-admin"){
    const uid=A.modal.uid;
    const amt=gv("pay-amt"),dt=gv("pay-date"),note=gv("pay-note")||"";
    if(!amt||!dt){re();return;}
    const {s}=getPP();
    const p={id:Date.now(),userId:uid,amount:parseFloat(amt),date:dt,note,periodKey:ppKey(s),addedByAdmin:true};
    mutate(db=>{if(!db.payments)db.payments=[];db.payments.push(p);});
    A.modal=null;render();return;
  }

  // ── Admin generate report ─────────────────────────────────────────────
  if(action.startsWith("open-gr-")){const uid=+action.slice(8);A.modal={type:"gen-report",uid};render();return;}
  if(action==="do-gen-rpt"){
    const uid=A.modal.uid;
    const {s:pS,e:pE}=getPP();const pk=ppKey(pS);
    if((DB.reports||[]).find(r=>r.userId===uid&&r.periodKey===pk)){A.modal=null;render();return;}
    const u=(DB.users||[]).find(x=>x.id===uid)||{};const rate=parseFloat(u.hourlyRate)||0;
    const ents=(DB.entries||[]).filter(e=>e.userId===uid);
    const pMs=inPP(ents,pS,pE).reduce((a,e)=>a+(e.netMs||0),0);const pH=msToH(pMs);
    const pPays=(DB.payments||[]).filter(p=>p.userId===uid&&p.periodKey===pk);
    const pRcvd=pPays.reduce((a,p)=>a+(parseFloat(p.amount)||0),0);
    const r={id:Date.now(),userId:uid,periodKey:pk,label:ppLabel(pS),totalMs:pMs,totalHours:pH,expectedPay:pH*rate,totalReceived:pRcvd,balance:pH*rate-pRcvd,payments:[...pPays],generated:new Date().toISOString(),generatedByAdmin:true};
    mutate(db=>{if(!db.reports)db.reports=[];db.reports.push(r);});
    A.modal=null;render();return;
  }

  // ── Admin delete user ─────────────────────────────────────────────────
  if(action.startsWith("confirm-du-")){
    const uid=+action.slice(11);
    A.modal={type:"confirm",message:"Delete user and ALL their data? This cannot be undone.",onOk:()=>{mutate(db=>{db.users=(db.users||[]).filter(u=>u.id!==uid);db.entries=(db.entries||[]).filter(e=>e.userId!==uid);db.payments=(db.payments||[]).filter(p=>p.userId!==uid);db.reports=(db.reports||[]).filter(r=>r.userId!==uid);});A.selUid=null;A.modal=null;render();}};
    render();return;
  }

  // ── Admin settings ────────────────────────────────────────────────────
  if(action==="save-adm-pw"){
    const np=gv("inp-anp"),cp=gv("inp-acp");
    const msg=document.getElementById("apwmsg");
    if(!np){if(msg){msg.textContent="Cannot be empty.";msg.style.color="#ff6b6b";}re();return;}
    if(np!==cp){if(msg){msg.textContent="Passwords don't match.";msg.style.color="#ff6b6b";}re();return;}
    mutate(db=>{db.adminPw=np;});
    if(msg){msg.textContent="✓ Admin password updated!";msg.style.color="#6bffb8";}
    re();return;
  }
  if(action==="save-curr"){
    mutate(db=>{db.currency=(gv("inp-curr")||"£").trim()||"£";});render();return;
  }

  // Show/hide user admin password
  if(action.startsWith("toggle-upw-")){
    const uid=+action.slice(11);
    const inp=document.getElementById("upw-inp-"+uid);
    const btn=document.getElementById("btn-upw-"+uid);
    if(inp){inp.type=inp.type==="password"?"text":"password";if(btn)btn.textContent=inp.type==="password"?"SHOW":"HIDE";}
    re();return;
  }
  // Save user admin password from settings panel
  if(action.startsWith("save-upw-")){
    const uid=+action.slice(9);
    const val=(gv("upw-inp-"+uid)||"").trim();
    if(!val){re();return;}
    mutate(db=>{db.users=(db.users||[]).map(u=>u.id===uid?{...u,adminPassword:val}:u);});
    re();return;
  }

  if(action==="export-json"){
    const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download="worklog-"+new Date().toISOString().split("T")[0]+".json";a.click();return;
  }

  // ── Modal generics ────────────────────────────────────────────────────
  if(action==="close-modal"){A.modal=null;A.showAForm=false;f.editEid=null;render();return;}
  if(action==="do-confirm"){if(A.modal?.onOk)A.modal.onOk();return;}

  if(action==="confirm-uapw"){
    const pw=gv("mod-pw");
    const uid=A.session?.userId;
    const me=(DB.users||[]).find(u=>u.id===uid)||{};
    const correct=me.adminPassword||"admin123";
    if(pw!==correct){const el=document.getElementById("mod-err");if(el)el.textContent="Incorrect password.";re();return;}
    if(A.modal?.onOk)A.modal.onOk();return;
  }
  if(action==="save-chg-apw"){
    const uid=A.session?.userId;
    const np=gv("mod-np"),cp=gv("mod-cp");
    const msg=document.getElementById("pw-msg");
    if(!np){if(msg){msg.textContent="Cannot be empty.";msg.style.color="#ff6b6b";}re();return;}
    if(np!==cp){if(msg){msg.textContent="Passwords don't match.";msg.style.color="#ff6b6b";}re();return;}
    mutate(db=>{db.users=(db.users||[]).map(u=>u.id===uid?{...u,adminPassword:np}:u);});
    if(msg){msg.textContent="✓ Updated!";msg.style.color="#6bffb8";}
    setTimeout(()=>{A.modal=null;A.aOpen=false;render();},1100);return;
  }

  re();
}

// ═══════════════════════════════════════════════════════════════════════

loadCache();

window.addEventListener("load",()=>{
  const tryInit=()=>{ if(window.google)initGoogle(); else setTimeout(tryInit,200); };
  tryInit();
  render();
});
if(document.readyState==="complete"){render();}
</script>
